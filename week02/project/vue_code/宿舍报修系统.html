<!DOCTYPE html>
<html lang="ch">
  
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>宿舍报修系统</title>
  </head>
  
<body>
  <div id="app">
    <h1>{{msg}}</h1>
  </div>

  <!-- 引入Vue模块 -->
  <script type="module">
    import {createApp} from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";
    /* 创建Vue的应用实例 */
    createApp({
      data(){
        return{
          // 定义数据
          msg:'成为代码大手子到底是什么感觉'
        }
      }
    }).mount("#app");
  </script>
</body>

</html>
